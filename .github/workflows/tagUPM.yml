on:
  push:
    branches:
      - 'main'
      - 'master'
env:
  GITHUB_TOKEN: ${{ github.token }}
permissions: write-all

jobs:
  version_tag:
    runs-on: ubuntu-latest
    name: Version Tag UPM
    steps:
      - name: Check out files
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          sparse-checkout: |
            README.md
            package.json

      - name: Get version
        id: version
        uses: williamrjackson/upm_version_increment_action@v1.0.1
        with: 
          path: package.json
          increment: none
      - name: tag-exists-action
        id: check-tag
        uses: mukunku/tag-exists-action@v1.2.0
        with: 
          tag: 'v${{steps.version.outputs.version}}'
      - name: Get result
        run: echo "Tag ${{steps.check-tag.outputs.exists}}"
      - name: gitconfig
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
      - name: Set version
        if: ${{ steps.check-tag.outputs.exists == 'true' }}
        id: increment
        uses: williamrjackson/upm_version_increment_action@v1.0.1
        with: 
          path: package.json
          increment: patch
      - name: UpdateReadmeA 
        if: ${{ steps.check-tag.outputs.exists == 'true' }}
        uses: williamrjackson/upm_readme_tag_link_action@v1.0.1
        with:
          path: README.md
          major: ${{ steps.increment.outputs.major }}
          minor: ${{ steps.increment.outputs.minor }}
          patch: ${{ steps.increment.outputs.patch }}
      - name: UpdateReadmeB
        if: ${{ steps.check-tag.outputs.exists != 'true' }}
        uses: williamrjackson/upm_readme_tag_link_action@v1.0.1
        with:
          path: README.md
          major: ${{ steps.version.outputs.major }}
          minor: ${{ steps.version.outputs.minor }}
          patch: ${{ steps.version.outputs.patch }}
      - name: Build commit message
        id: commit-message
        shell: bash
        run: |
          if [[ "${{ steps.check-tag.outputs.exists }}" == "true" ]]; then
            major="${{ steps.increment.outputs.major }}"
            minor="${{ steps.increment.outputs.minor }}"
            patch="${{ steps.increment.outputs.patch }}"
          else
            major="${{ steps.version.outputs.major }}"
            minor="${{ steps.version.outputs.minor }}"
            patch="${{ steps.version.outputs.patch }}"
          fi
          
          target_tag="v${major}.${minor}.${patch}"
          previous_tag="$(git tag --list "v${major}.${minor}.*" --sort=version:refname | grep -Fxv "$target_tag" | tail -n 1)"
          
          {
            echo "message<<EOF"
            echo "Release ${target_tag} [skip ci]"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since ${previous_tag}:"
              git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" | sed 's/ \[skip ci\]//g'
            else
              echo "Changes in this release:"
              git log --no-merges --pretty=format:'- %s (%h)' | sed 's/ \[skip ci\]//g'
            fi
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: commit changes
        run: |
          git add .
          printf '%s\n' "${{ steps.commit-message.outputs.message }}" > commit-message.txt
          git commit -F commit-message.txt
      - name: push
        run: git push
      - name: tagA
        if: ${{ steps.check-tag.outputs.exists == 'true' }}
        run: |
          git tag -f v${{ steps.increment.outputs.major }}.${{ steps.increment.outputs.minor }}
          git tag -f v${{ steps.increment.outputs.major }}.${{ steps.increment.outputs.minor }}.${{ steps.increment.outputs.patch }}
      - name: tagB
        if: ${{ steps.check-tag.outputs.exists != 'true' }}
        run: |
          git tag -f v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
          git tag -f v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}.${{ steps.version.outputs.patch }}
      - name: push tags
        run: git push -f --tags
